name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: mbstring, intl, pdo_sqlite, sqlite3, redis, mongodb
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        env:
          APP_ENV: testing
          BROADCAST_CONNECTION: log
          REVERB_APP_ID: local-app
          REVERB_APP_KEY: local-key
          REVERB_APP_SECRET: local-secret
        run: composer install --no-interaction --prefer-dist --no-progress --ignore-platform-req=ext-mongodb

      - name: Prepare environment
        run: |
          cat > .env <<'EOF'
          APP_NAME=Laravel
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost
          LOG_CHANNEL=stack
          LOG_LEVEL=debug
          DB_CONNECTION=sqlite
          DB_DATABASE=:memory:
          CACHE_STORE=array
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=array
          BROADCAST_CONNECTION=log
          MAIL_MAILER=array
          EOF
          php artisan key:generate

      - name: Run tests
        run: composer test
