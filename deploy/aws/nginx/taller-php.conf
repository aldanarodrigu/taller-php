server {
    listen 80;
    listen [::]:80;
    server_name ec2-18-226-9-206.us-east-2.compute.amazonaws.com;
    root /var/www/taller-php/public;
    index index.php index.html;

    client_max_body_size 20m;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Serve static frontend (SPA). If a file isn't found, fall back to index.html
    # so the client-side router can handle routes. API requests under /api/
    # are forwarded to Laravel's index.php instead.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ensure API routes are handled by Laravel
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Proxy WebSocket connections for Reverb (Laravel Reverb)
    location /app/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Prevent Nginx from adding or passing compression extensions
        proxy_set_header Sec-WebSocket-Extensions "";
        proxy_set_header Accept-Encoding "";

        proxy_read_timeout 86400;
        proxy_buffering off;
        proxy_pass http://127.0.0.1:6001;
    }

    location ~ \.php$ {
        include fastcgi_params;
        # Use php8.3-fpm socket (server runs php8.3)
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
