services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taller-php-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - storage:/var/www/html/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-postgres}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSLMODE: ${DB_SSLMODE:-require}
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      redis:
        condition: service_started
    networks:
      - taller-net

  nginx:
    image: nginx:1.27-alpine
    container_name: taller-php-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - .:/var/www/html:ro
      - storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - taller-net

  redis:
    image: redis:7-alpine
    container_name: taller-php-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - taller-net

  websockets:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taller-php-websockets
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "6001:6001"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      REVERB_APP_ID: ${REVERB_APP_ID:-local-app}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-local-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-local-secret}
      REVERB_HOST: ${REVERB_HOST:-0.0.0.0}
      REVERB_PORT: ${REVERB_PORT:-6001}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=6001", "--debug"]
    depends_on:
      - app
      - redis
    volumes:
      - .:/var/www/html
      - storage:/var/www/html/storage
    networks:
      - taller-net
      
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taller-php-worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "redis", "--queue=default", "--tries=3", "--sleep=1", "--verbose"]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-postgres}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSLMODE: ${DB_SSLMODE:-require}
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REVERB_APP_ID: ${REVERB_APP_ID:-local-app}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-local-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-local-secret}
      REVERB_HOST: ${REVERB_HOST:-websockets}
      REVERB_PORT: ${REVERB_PORT:-6001}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
    depends_on:
      - app
      - redis
      - websockets
    volumes:
      - .:/var/www/html
      - storage:/var/www/html/storage
    networks:
      - taller-net

volumes:
  storage:

networks:
  taller-net:
    driver: bridge